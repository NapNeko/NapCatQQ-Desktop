name: Release MSI

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "版本号，支持 1.7.28 或 v1.7.28；为空时从 pyproject.toml 读取"
        required: false
        default: ""
        type: string
      sync_version_files:
        description: "是否同步版本文件到代码仓库"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  resolve:
    runs-on: windows-latest
    outputs:
      version: ${{ steps.version.outputs.VERSION }}
      version_plain: ${{ steps.version.outputs.VERSION_PLAIN }}
    steps:
      - name: "检出代码"
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: "解析版本号"
        id: version
        shell: pwsh
        run: |
          $inputVersion = "${{ inputs.version }}"

          if ("${{ github.event_name }}" -eq "push" -and "${{ github.ref }}" -like "refs/tags/*") {
            $version = "${{ github.ref }}" -replace "refs/tags/", ""
          } elseif ($inputVersion) {
            $version = $inputVersion
          } else {
            $content = Get-Content pyproject.toml -Raw
            if ($content -match 'version\s*=\s*"([^"]+)"') {
              $version = $matches[1]
            } else {
              Write-Error "无法从 pyproject.toml 提取版本号"
              exit 1
            }
          }

          if (-not ($version -like "v*")) {
            $version = "v$version"
          }

          $plain = $version -replace "^v", ""
          "VERSION=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "VERSION_PLAIN=$plain" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "版本: $version"

  build-msi:
    needs: resolve
    uses: ./.github/workflows/build-msi.yml
    with:
      version: ${{ needs.resolve.outputs.version }}

  publish:
    needs:
      - resolve
      - build-msi
    runs-on: windows-latest
    steps:
      - name: "检出代码"
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: "安装 uv"
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: "同步版本文件"
        if: ${{ inputs.sync_version_files || github.event_name == 'push' }}
        shell: pwsh
        run: |
          $version = "${{ needs.resolve.outputs.version }}"
          uv sync --frozen --no-dev
          uv run --frozen python script/utils/update_version.py $version

          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add pyproject.toml src/core/config/__init__.py docs/CHANGELOG.md
          git diff --staged --quiet || git commit -m "chore: 同步版本号到 $version"
          git push origin HEAD:${{ github.ref_name }} || Write-Host "无需推送"

      - name: "下载 MSI 制品"
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build-msi.outputs.artifact_name }}
          path: release-assets

      - name: "发布到 GitHub Releases"
        if: ${{ github.event_name == 'push' }}
        uses: softprops/action-gh-release@v1
        with:
          draft: false
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: ${{ needs.resolve.outputs.version }}
          name: NapCatQQ Desktop ${{ needs.resolve.outputs.version }}
          body_path: docs/CHANGELOG.md
          files: release-assets/*.msi
