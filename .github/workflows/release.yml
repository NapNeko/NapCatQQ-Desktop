name: Release Pipeline

on:
  push:
    tags:
      - "v*.*.*"
    branches:
      - "release/**"
  workflow_dispatch:
    inputs:
      version:
        description: "版本号，支持 1.7.28 或 v1.7.28；为空时从 pyproject.toml 读取"
        required: false
        default: ""
        type: string
      sync_version_files:
        description: "是否在构建目录版前同步版本文件"
        required: false
        default: false
        type: boolean
      publish_release:
        description: "是否在本次手动运行中创建 GitHub Release"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  resolve:
    runs-on: windows-latest
    outputs:
      version: ${{ steps.resolve.outputs.VERSION }}
      version_plain: ${{ steps.resolve.outputs.VERSION_PLAIN }}
      publish_release: ${{ steps.resolve.outputs.PUBLISH_RELEASE }}
      sync_version_files: ${{ steps.resolve.outputs.SYNC_VERSION_FILES }}
    steps:
      - name: "检出代码"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "解析流程参数"
        id: resolve
        shell: pwsh
        run: |
          $inputVersion = "${{ inputs.version }}"

          if ("${{ github.event_name }}" -eq "push" -and "${{ github.ref }}" -like "refs/tags/*") {
            $version = "${{ github.ref }}" -replace "refs/tags/", ""
            $publishRelease = "true"
            $syncVersionFiles = "true"
          } elseif ($inputVersion) {
            $version = $inputVersion
            $publishRelease = if ("${{ inputs.publish_release }}" -eq "true") { "true" } else { "false" }
            $syncVersionFiles = if ("${{ inputs.sync_version_files }}" -eq "true") { "true" } else { "false" }
          } else {
            $content = Get-Content pyproject.toml -Raw
            if ($content -match 'version\s*=\s*"([^"]+)"') {
              $version = $matches[1]
            } else {
              Write-Error "无法从 pyproject.toml 提取版本号"
              exit 1
            }
            $publishRelease = "false"
            $syncVersionFiles = "false"
          }

          if (-not ($version -like "v*")) {
            $version = "v$version"
          }

          $plain = $version -replace "^v", ""
          "VERSION=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "VERSION_PLAIN=$plain" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "PUBLISH_RELEASE=$publishRelease" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "SYNC_VERSION_FILES=$syncVersionFiles" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

  portable:
    needs: resolve
    uses: ./.github/workflows/build-portable.yml
    with:
      version: ${{ needs.resolve.outputs.version }}
      sync_version_files: ${{ fromJson(needs.resolve.outputs.sync_version_files) }}

  msi:
    needs:
      - resolve
      - portable
    uses: ./.github/workflows/build-msi.yml
    with:
      version: ${{ needs.resolve.outputs.version }}
      portable_artifact_name: ${{ needs.portable.outputs.artifact_name }}
      build_portable: false

  publish:
    needs:
      - resolve
      - portable
      - msi
    if: ${{ needs.resolve.outputs.publish_release == 'true' }}
    runs-on: windows-latest
    steps:
      - name: "检出代码"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "下载目录版制品"
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.portable.outputs.artifact_name }}
          path: release-assets/portable

      - name: "下载 MSI 制品"
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.msi.outputs.artifact_name }}
          path: release-assets/msi

      - name: "读取更新日志"
        id: changelog
        shell: pwsh
        run: |
          $body = Get-Content -Path "docs/CHANGELOG.md" -Raw
          "BODY<<EOF" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          $body | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "EOF" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: "创建发布并上传制品"
        uses: softprops/action-gh-release@v1
        with:
          draft: false
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: ${{ needs.resolve.outputs.version }}
          name: NapCatQQ Desktop Release ${{ needs.resolve.outputs.version }}
          body: ${{ steps.changelog.outputs.BODY }}
          files: |
            release-assets/portable/NapCatQQ-Desktop.zip
            release-assets/msi/${{ needs.msi.outputs.msi_file_name }}
