name: Build Portable Package

on:
  workflow_call:
    inputs:
      version:
        description: "版本号，支持 1.7.28 或 v1.7.28；为空时从 pyproject.toml 读取"
        required: false
        default: ""
        type: string
      sync_version_files:
        description: "是否执行 update_version.py 并推送版本文件"
        required: false
        default: false
        type: boolean
      upload_artifact_name:
        description: "制品名；为空时自动按版本生成"
        required: false
        default: ""
        type: string
    outputs:
      version:
        description: "带 v 前缀的版本号"
        value: ${{ jobs.build.outputs.version }}
      version_plain:
        description: "不带 v 前缀的版本号"
        value: ${{ jobs.build.outputs.version_plain }}
      artifact_name:
        description: "上传的便携版制品名"
        value: ${{ jobs.build.outputs.artifact_name }}
  workflow_dispatch:
    inputs:
      version:
        description: "版本号，支持 1.7.28 或 v1.7.28；为空时从 pyproject.toml 读取"
        required: false
        default: ""
        type: string
      sync_version_files:
        description: "是否执行 update_version.py 并推送版本文件"
        required: false
        default: false
        type: boolean
      upload_artifact_name:
        description: "制品名；为空时自动按版本生成"
        required: false
        default: ""
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    env:
      PYTHONUTF8: "1"
      PYTHONIOENCODING: "utf-8"
    outputs:
      version: ${{ steps.resolve_version.outputs.VERSION }}
      version_plain: ${{ steps.resolve_version.outputs.VERSION_PLAIN }}
      artifact_name: ${{ steps.resolve_artifact.outputs.ARTIFACT_NAME }}
    steps:
      - name: "检出代码"
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN || github.token }}
          submodules: true
          fetch-depth: 0
          persist-credentials: true

      - name: "设置 Python 3.12"
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: "创建虚拟环境并安装依赖"
        shell: pwsh
        run: |
          python -m venv .venv
          .\.venv\Scripts\Activate.ps1
          python -m pip install --upgrade pip
          if (Test-Path "requirements.txt") {
            python -m pip install -r requirements.txt
          } else {
            python -m pip install pyinstaller
          }
          python -m pip install pyinstaller

      - name: "解析版本号"
        id: resolve_version
        shell: pwsh
        run: |
          $inputVersion = "${{ inputs.version }}"

          if ($inputVersion) {
            $version = $inputVersion
          } else {
            $content = Get-Content pyproject.toml -Raw
            if ($content -match 'version\s*=\s*"([^"]+)"') {
              $version = $matches[1]
            } else {
              Write-Error "无法从 pyproject.toml 提取版本号"
              exit 1
            }
          }

          if (-not ($version -like "v*")) {
            $version = "v$version"
          }

          $plain = $version -replace "^v", ""
          "VERSION=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "VERSION_PLAIN=$plain" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Resolved version: $version"

      - name: "同步版本文件"
        if: ${{ inputs.sync_version_files }}
        shell: pwsh
        run: |
          $version = "${{ steps.resolve_version.outputs.VERSION }}"
          .\.venv\Scripts\python.exe script/utils/update_version.py $version

          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add pyproject.toml src/core/config/__init__.py docs/CHANGELOG.md
          git diff --staged --quiet || git commit -m "🤖 自动更新版本号到 $version"
          git push origin HEAD:master || echo "推送失败或无更改"

      - name: "打包 Release 版本"
        shell: pwsh
        run: |
          .\.venv\Scripts\python.exe -m PyInstaller ./script/build_scripts/main.spec

      - name: "压缩目录版"
        shell: pwsh
        run: |
          $zipPath = "dist/NapCatQQ-Desktop.zip"
          if (Test-Path $zipPath) {
            Remove-Item $zipPath -Force
          }
          Compress-Archive -Path "dist/NapCatQQ-Desktop" -DestinationPath $zipPath

      - name: "解析制品名"
        id: resolve_artifact
        shell: pwsh
        run: |
          $artifactName = "${{ inputs.upload_artifact_name }}"
          if (-not $artifactName) {
            $artifactName = "portable-dist-${{ steps.resolve_version.outputs.VERSION_PLAIN }}"
          }
          "ARTIFACT_NAME=$artifactName" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Artifact name: $artifactName"

      - name: "验证输出"
        shell: pwsh
        run: |
          if (-not (Test-Path "dist/NapCatQQ-Desktop")) {
            Write-Error "dist/NapCatQQ-Desktop 不存在"
            exit 1
          }
          if (-not (Test-Path "dist/NapCatQQ-Desktop.zip")) {
            Write-Error "dist/NapCatQQ-Desktop.zip 不存在"
            exit 1
          }

      - name: "上传目录版制品"
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.resolve_artifact.outputs.ARTIFACT_NAME }}
          if-no-files-found: error
          retention-days: 7
          path: |
            dist/NapCatQQ-Desktop/**
            dist/NapCatQQ-Desktop.zip
